<main>
  <app-page-title title="Editar Informe de Auditoría" subtitle="Portal Institucional" />

  @if (isLoading()) {
    <div class="flex items-center justify-center py-24 text-default-500 text-sm gap-2">
      <div class="size-5 animate-spin"><ng-icon name="lucideLoader"></ng-icon></div>
      Cargando informe...
    </div>
  } @else {
    <form [formGroup]="form" (ngSubmit)="onSubmit()">
      <div class="grid lg:grid-cols-3 grid-cols-1 gap-5">

        <!-- Columna principal -->
        <div class="lg:col-span-2 space-y-5">

          <div class="card">
            <div class="card-header"><h6 class="card-title">Información del Informe</h6></div>
            <div class="card-body space-y-4">

              <div>
                <label class="block mb-1.5 text-sm font-medium text-default-800">
                  Nombre <span class="text-danger">*</span>
                </label>
                <input type="text" class="form-input" placeholder="Ej: Informe de Auditoría Financiera 2024" formControlName="nombre">
                @if (form.get('nombre')?.invalid && form.get('nombre')?.touched) {
                  <p class="mt-1 text-danger text-xs">Este campo es requerido</p>
                }
              </div>

              <div>
                <label class="block mb-1.5 text-sm font-medium text-default-800">Descripción</label>
                <textarea class="form-input" placeholder="Descripción o resumen del informe de auditoría..." formControlName="descripcion" rows="4"></textarea>
              </div>

            </div>
          </div>

          <!-- Archivo PDF -->
          <div class="card">
            <div class="card-header"><h6 class="card-title">Documento PDF</h6></div>
            <div class="card-body">

              @if (fileName()) {
                <div class="flex items-center justify-between p-3 bg-default-100 rounded-lg mb-3">
                  <div class="flex items-center gap-2 text-sm text-default-700 min-w-0">
                    <div class="size-4 text-danger shrink-0"><ng-icon name="lucideFileText"></ng-icon></div>
                    <span class="truncate">{{ fileName() }}</span>
                  </div>
                  <button type="button" (click)="removeFile()" class="btn size-6 bg-danger/10 text-danger hover:bg-danger hover:text-white ms-2 shrink-0">
                    <div class="size-3"><ng-icon name="lucideX"></ng-icon></div>
                  </button>
                </div>
              }

              <label class="flex flex-col items-center justify-center w-full h-32 border-2 border-dashed border-default-300 rounded-lg cursor-pointer hover:border-primary hover:bg-primary/5 transition-colors"
                [class.opacity-50]="uploadingFile()">
                @if (uploadingFile()) {
                  <div class="size-5 animate-spin text-primary"><ng-icon name="lucideLoader"></ng-icon></div>
                  <span class="text-sm text-default-500 mt-2">Subiendo archivo...</span>
                } @else {
                  <div class="size-6 text-default-400 mb-2"><ng-icon name="lucideUpload"></ng-icon></div>
                  <span class="text-sm text-default-600 font-medium">Reemplazar PDF</span>
                  <span class="text-xs text-default-400 mt-1">PDF, DOC, DOCX (máx. 20 MB)</span>
                }
                <input type="file" accept=".pdf,.doc,.docx" class="hidden" (change)="onFileSelected($event)" [disabled]="uploadingFile()">
              </label>

            </div>
          </div>

        </div>

        <!-- Columna lateral -->
        <div class="space-y-5">

          <div class="card">
            <div class="card-header"><h6 class="card-title">Estado y Publicación</h6></div>
            <div class="card-body space-y-4">

              <div>
                <label class="block mb-1.5 text-sm font-medium text-default-800">
                  Estado <span class="text-danger">*</span>
                </label>
                <select class="form-input" formControlName="estado">
                  <option value="borrador">Borrador</option>
                  <option value="publicado">Publicado</option>
                </select>
              </div>

              <div>
                <label class="block mb-1.5 text-sm font-medium text-default-800">
                  Año <span class="text-danger">*</span>
                </label>
                <select class="form-input" formControlName="anio">
                  @for (anio of anios; track anio) {
                    <option [value]="anio">{{ anio }}</option>
                  }
                </select>
              </div>

              <div>
                <label class="block mb-1.5 text-sm font-medium text-default-800">Fecha del informe</label>
                <input type="date" class="form-input" formControlName="fecha">
              </div>

              <div class="flex items-center gap-2 pt-1">
                <input type="checkbox" id="publicado_en_web" formControlName="publicado_en_web" class="form-checkbox">
                <label for="publicado_en_web" class="text-sm text-default-700">Publicar en el portal web</label>
              </div>

            </div>
          </div>

          <div class="flex flex-col gap-2">
            <button
              type="submit"
              class="btn bg-primary text-white w-full"
              [disabled]="form.invalid || submitting() || uploadingFile()"
            >
              @if (submitting()) {
                <div class="size-4 me-1 animate-spin"><ng-icon name="lucideLoader"></ng-icon></div>
                Guardando...
              } @else {
                Guardar Cambios
              }
            </button>
            <a routerLink="/senefco/informes-auditoria" class="btn border border-default-300 text-default-600 hover:bg-default-100 w-full text-center">
              Cancelar
            </a>
          </div>

        </div>
      </div>
    </form>
  }
</main>
