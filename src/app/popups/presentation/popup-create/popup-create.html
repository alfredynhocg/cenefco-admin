<main>
  <app-page-title title="Nuevo Popup" subtitle="Popups" />
  <div class="grid grid-cols-1 gap-5 mb-5">
    <div class="card">
      <div class="card-header"><h4 class="card-title">Configuración del Popup</h4></div>
      <div class="p-6">
        <form [formGroup]="form" (ngSubmit)="onSubmit()" class="grid grid-cols-1 md:grid-cols-2 gap-5">
          <div class="md:col-span-2">
            <label class="block text-sm font-medium text-default-700 mb-1">Título</label>
            <input type="text" formControlName="titulo" class="form-input w-full" placeholder="Título del popup">
          </div>
          <div class="md:col-span-2">
            <label class="block text-sm font-medium text-default-700 mb-1">Contenido</label>
            <textarea formControlName="contenido" rows="4" class="form-input w-full" placeholder="Contenido HTML del popup"></textarea>
          </div>
          <div class="md:col-span-2">
            <label class="block text-sm font-medium text-default-700 mb-1">URL de Imagen</label>
            <input type="text" formControlName="imagen_url" class="form-input w-full" placeholder="https://...">
          </div>
          <div>
            <label class="block text-sm font-medium text-default-700 mb-1">URL del Enlace</label>
            <input type="text" formControlName="enlace_url" class="form-input w-full" placeholder="https://...">
          </div>
          <div>
            <label class="block text-sm font-medium text-default-700 mb-1">Texto del Enlace</label>
            <input type="text" formControlName="enlace_texto" class="form-input w-full" placeholder="Ej: Ver más">
          </div>
          <div>
            <label class="block text-sm font-medium text-default-700 mb-1">Posición</label>
            <select formControlName="posicion" class="form-input w-full">
              <option value="center">Centro</option>
              <option value="top">Arriba</option>
              <option value="bottom">Abajo</option>
              <option value="top-left">Arriba izquierda</option>
              <option value="top-right">Arriba derecha</option>
              <option value="bottom-left">Abajo izquierda</option>
              <option value="bottom-right">Abajo derecha</option>
            </select>
          </div>
          <div>
            <label class="block text-sm font-medium text-default-700 mb-1">Delay (segundos)</label>
            <input type="number" formControlName="delay_segundos" class="form-input w-full" min="0">
          </div>
          <div>
            <label class="block text-sm font-medium text-default-700 mb-1">Fecha de Inicio</label>
            <input type="date" formControlName="fecha_inicio" class="form-input w-full">
          </div>
          <div>
            <label class="block text-sm font-medium text-default-700 mb-1">Fecha de Fin</label>
            <input type="date" formControlName="fecha_fin" class="form-input w-full">
          </div>
          <div class="md:col-span-2 flex flex-wrap items-center gap-6">
            <div class="flex items-center gap-2"><input type="checkbox" formControlName="mostrar_una_vez_sesion" id="sesion" class="form-checkbox"><label for="sesion" class="text-sm text-default-700">Mostrar una vez por sesión</label></div>
            <div class="flex items-center gap-2"><input type="checkbox" formControlName="mostrar_una_vez_siempre" id="siempre" class="form-checkbox"><label for="siempre" class="text-sm text-default-700">Mostrar una sola vez (siempre)</label></div>
            <div class="flex items-center gap-2"><input type="checkbox" formControlName="activo" id="activo" class="form-checkbox"><label for="activo" class="text-sm text-default-700">Activo</label></div>
          </div>
          <div class="md:col-span-2 flex items-center gap-3">
            <button type="submit" class="btn bg-primary text-white" [disabled]="submitting()">
              @if (submitting()) { <div class="size-4 me-2 animate-spin"><ng-icon name="lucideLoader"></ng-icon></div> Guardando... } @else { Guardar Popup }
            </button>
            <a routerLink="/senefco/popups" class="btn bg-default-200 text-default-700">Cancelar</a>
          </div>
        </form>
      </div>
    </div>
  </div>
</main>
