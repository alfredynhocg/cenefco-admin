<div class="topbar-item hs-dropdown relative inline-flex">
    <button class="cursor-pointer bg-primary/10 rounded-full" aria-haspopup="menu" aria-expanded="false" aria-label="Dropdown">
        <div class="hs-dropdown-toggle size-9.5 rounded-full bg-primary/20 flex items-center justify-center text-primary font-semibold text-sm">
            {{ (auth.currentUser()?.name ?? 'U')[0].toUpperCase() }}
        </div>
    </button>

    <div class="hs-dropdown-menu min-w-56" role="menu" aria-orientation="vertical">
        <div class="p-3">
            <div class="flex items-center gap-3">
                <div class="size-10 rounded-full bg-primary/15 flex items-center justify-center shrink-0">
                    <span class="text-sm font-bold text-primary">
                        {{ (auth.currentUser()?.name ?? 'U')[0].toUpperCase() }}
                    </span>
                </div>
                <div class="min-w-0">
                    <p class="text-sm font-semibold text-default-800 truncate">{{ auth.currentUser()?.name }}</p>
                    <p class="text-xs text-default-400 truncate">{{ auth.currentUser()?.email }}</p>
                    @if (auth.currentUser()?.role_nombre) {
                        <span class="text-xs text-primary font-medium">{{ auth.currentUser()?.role_nombre }}</span>
                    }
                </div>
            </div>
        </div>

        <div class="border-t border-default-200 -mx-2 my-1"></div>

        <div class="flex flex-col gap-y-0.5 px-1">
            <a
                routerLink="/senefco/mi-perfil"
                class="flex items-center gap-x-3 py-2 px-3 text-sm font-medium text-default-600 hover:bg-default-100 rounded-lg transition-colors"
            >
                <div class="size-4"><ng-icon name="lucideUserCog"></ng-icon></div>
                Mi perfil
            </a>

            <div class="border-t border-default-100 -mx-1 my-1"></div>

            <button
                (click)="logout()"
                class="flex items-center gap-x-3 w-full py-2 px-3 text-sm font-medium text-danger hover:bg-danger/10 rounded-lg transition-colors"
            >
                <div class="size-4"><ng-icon name="lucideLogOut"></ng-icon></div>
                Cerrar sesión
            </button>
        </div>
    </div>
</div>
