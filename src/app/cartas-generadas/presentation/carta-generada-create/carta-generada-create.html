<main>
  <app-page-title title="Generar Carta" subtitle="Cartas Generadas" />
  <div class="grid grid-cols-1 gap-5 mb-5">
    <div class="card">
      <div class="card-header"><h4 class="card-title">Datos de la Carta a Generar</h4></div>
      <div class="p-6">
        <form [formGroup]="form" (ngSubmit)="onSubmit()" class="grid grid-cols-1 md:grid-cols-2 gap-5">
          <div>
            <label class="block text-sm font-medium text-default-700 mb-1">ID de Usuario</label>
            <input type="number" formControlName="id_us" class="form-input w-full" placeholder="ID del estudiante">
          </div>
          <div>
            <label class="block text-sm font-medium text-default-700 mb-1">ID del Modelo de Carta</label>
            <input type="number" formControlName="id_cartamod" class="form-input w-full" placeholder="ID del modelo a usar">
          </div>
          <div>
            <label class="block text-sm font-medium text-default-700 mb-1">N° de Contrato</label>
            <input type="number" formControlName="cp_nro_contrato" class="form-input w-full">
          </div>
          <div>
            <label class="block text-sm font-medium text-default-700 mb-1">Gestión del Contrato</label>
            <input type="text" formControlName="cp_gestion_contrato" class="form-input w-full" placeholder="Ej: 2025-I">
          </div>
          <div class="flex items-center gap-2 pt-2">
            <input type="checkbox" formControlName="usar_encabezado_pie_estandar" id="encabezado" class="form-checkbox">
            <label for="encabezado" class="text-sm text-default-700">Usar encabezado y pie estándar</label>
          </div>
          <div>
            <label class="block text-sm font-medium text-default-700 mb-1">Estado</label>
            <select formControlName="estado" class="form-input w-full">
              <option [value]="1">Activo</option>
              <option [value]="0">Inactivo</option>
            </select>
          </div>
          <div class="md:col-span-2">
            <label class="block text-sm font-medium text-default-700 mb-1">Texto Principal</label>
            <textarea formControlName="textocarta" rows="4" class="form-input w-full" placeholder="Contenido principal de la carta..."></textarea>
          </div>
          <div class="md:col-span-2">
            <label class="block text-sm font-medium text-default-700 mb-1">Texto Sección 1</label>
            <textarea formControlName="textocarta1" rows="3" class="form-input w-full"></textarea>
          </div>
          <div class="md:col-span-2">
            <label class="block text-sm font-medium text-default-700 mb-1">Texto Sección 3</label>
            <textarea formControlName="textocarta3" rows="3" class="form-input w-full"></textarea>
          </div>
          <div class="md:col-span-2 flex items-center gap-3">
            <button type="submit" class="btn bg-primary text-white" [disabled]="submitting()">
              @if (submitting()) { <div class="size-4 me-2 animate-spin"><ng-icon name="lucideLoader"></ng-icon></div> Generando... }
              @else { <div class="size-4 me-1"><ng-icon name="lucideFileText"></ng-icon></div> Generar Carta }
            </button>
            <a routerLink="/senefco/cartas-generadas" class="btn bg-default-200 text-default-700">Cancelar</a>
          </div>
        </form>
      </div>
    </div>
  </div>
</main>
