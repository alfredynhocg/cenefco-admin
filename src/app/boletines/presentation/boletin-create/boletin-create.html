<main>
  <app-page-title title="Nuevo Boletín" subtitle="Boletines" />
  <div class="grid grid-cols-1 gap-5 mb-5">
    <div class="card">
      <div class="card-header"><h4 class="card-title">Datos del Boletín</h4></div>
      <div class="p-6">
        <form [formGroup]="form" (ngSubmit)="onSubmit()" class="grid grid-cols-1 md:grid-cols-2 gap-5">
          <div class="md:col-span-2">
            <label class="block text-sm font-medium text-default-700 mb-1">Título del Boletín <span class="text-danger">*</span></label>
            <input type="text" formControlName="titulo_boletin" class="form-input w-full" placeholder="Título principal del boletín">
            @if (form.get('titulo_boletin')?.invalid && form.get('titulo_boletin')?.touched) { <p class="text-danger text-xs mt-1">El título es requerido</p> }
          </div>
          <div class="md:col-span-2">
            <label class="block text-sm font-medium text-default-700 mb-1">Título de Página</label>
            <input type="text" formControlName="titulo_pagina" class="form-input w-full" placeholder="Título para el navegador (SEO)">
          </div>
          <div>
            <label class="block text-sm font-medium text-default-700 mb-1">N° de Boletín</label>
            <input type="number" formControlName="num_boletin" class="form-input w-full">
          </div>
          <div>
            <label class="block text-sm font-medium text-default-700 mb-1">Estado</label>
            <select formControlName="estado" class="form-input w-full">
              <option [value]="1">Activo</option>
              <option [value]="0">Inactivo</option>
            </select>
          </div>
          <div class="md:col-span-2">
            <label class="block text-sm font-medium text-default-700 mb-1">Descripción</label>
            <textarea formControlName="descripcion_boletin" rows="5" class="form-input w-full" placeholder="Descripción o contenido del boletín..."></textarea>
          </div>
          <div class="md:col-span-2 flex items-center gap-3">
            <button type="submit" class="btn bg-primary text-white" [disabled]="submitting()">
              @if (submitting()) { <div class="size-4 me-2 animate-spin"><ng-icon name="lucideLoader"></ng-icon></div> Guardando... }
              @else { Guardar Boletín }
            </button>
            <a routerLink="/senefco/boletines" class="btn bg-default-200 text-default-700">Cancelar</a>
          </div>
        </form>
      </div>
    </div>
  </div>
</main>
