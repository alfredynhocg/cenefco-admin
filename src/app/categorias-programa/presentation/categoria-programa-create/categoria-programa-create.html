<main>
  <app-page-title title="Nueva Categoría de Programa" subtitle="Catálogo" />

  <form [formGroup]="form" (ngSubmit)="onSubmit()">
    <div class="grid lg:grid-cols-3 grid-cols-1 gap-5">

      <div class="lg:col-span-2 space-y-5">
        <div class="card">
          <div class="card-header"><h6 class="card-title">Datos Principales</h6></div>
          <div class="card-body space-y-4">

            <div>
              <label class="block mb-1.5 text-sm font-medium text-default-800">
                Nombre <span class="text-danger">*</span>
              </label>
              <input type="text" class="form-input" placeholder="Nombre de la categoría" formControlName="nombre">
              @if (form.get('nombre')?.invalid && form.get('nombre')?.touched) {
                <p class="mt-1 text-danger text-xs">Este campo es requerido (máximo 200 caracteres)</p>
              }
            </div>

            <div>
              <label class="block mb-1.5 text-sm font-medium text-default-800">Slug</label>
              <input type="text" class="form-input" placeholder="slug-de-la-categoria" formControlName="slug">
              <p class="mt-1 text-default-500 text-xs">Se genera automáticamente si se deja vacío</p>
            </div>

            <div>
              <label class="block mb-1.5 text-sm font-medium text-default-800">Descripción</label>
              <textarea class="form-input" rows="3" placeholder="Descripción de la categoría" formControlName="descripcion"></textarea>
            </div>

            <div class="grid grid-cols-2 gap-4">
              <div>
                <label class="block mb-1.5 text-sm font-medium text-default-800">Ícono</label>
                <input type="text" class="form-input" placeholder="Ej: lucideBookOpen" formControlName="icono">
              </div>
              <div>
                <label class="block mb-1.5 text-sm font-medium text-default-800">Color</label>
                <input type="text" class="form-input" placeholder="Ej: #3B82F6" formControlName="color">
              </div>
            </div>

          </div>
        </div>

        <div class="card">
          <div class="card-header"><h6 class="card-title">SEO</h6></div>
          <div class="card-body space-y-4">
            <div>
              <label class="block mb-1.5 text-sm font-medium text-default-800">Meta título</label>
              <input type="text" class="form-input" placeholder="Meta título para SEO" formControlName="meta_titulo">
            </div>
            <div>
              <label class="block mb-1.5 text-sm font-medium text-default-800">Meta descripción</label>
              <textarea class="form-input" rows="2" placeholder="Meta descripción para SEO" formControlName="meta_descripcion"></textarea>
            </div>
          </div>
        </div>
      </div>

      <div class="space-y-5">
        <div class="card">
          <div class="card-header"><h6 class="card-title">Publicación</h6></div>
          <div class="card-body space-y-4">
            <div>
              <label class="block mb-1.5 text-sm font-medium text-default-800">Orden</label>
              <input type="number" class="form-input" formControlName="orden" min="0">
            </div>
            <div class="flex items-center gap-2">
              <input type="checkbox" id="activo" class="form-checkbox" formControlName="activo">
              <label for="activo" class="text-sm font-medium text-default-800">Activo</label>
            </div>
          </div>
        </div>

        <div class="card">
          <div class="card-header"><h6 class="card-title">Acciones</h6></div>
          <div class="card-body flex flex-col gap-2">
            <button
              type="submit"
              class="btn bg-primary text-white w-full"
              [disabled]="form.invalid || submitting()"
            >
              @if (submitting()) {
                <div class="size-4 me-1 animate-spin"><ng-icon name="lucideLoader"></ng-icon></div>
                Guardando...
              } @else {
                Crear Categoría
              }
            </button>
            <a routerLink="/senefco/categorias-programa" class="btn border border-default-300 text-default-600 hover:bg-default-100 w-full text-center">
              Cancelar
            </a>
          </div>
        </div>
      </div>

    </div>
  </form>
</main>
