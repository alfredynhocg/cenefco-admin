<main>
  <app-page-title title="Nuevo Eje PEI" subtitle="Plan Estratégico Institucional" />

  <form [formGroup]="form" (ngSubmit)="onSubmit()">
    <div class="grid lg:grid-cols-3 grid-cols-1 gap-5">

      <!-- Columna principal -->
      <div class="lg:col-span-2 space-y-5">

        <div class="card">
          <div class="card-header"><h6 class="card-title">Datos del Eje</h6></div>
          <div class="card-body space-y-4">

            <div>
              <label class="block mb-1.5 text-sm font-medium text-default-800">
                Nombre del eje <span class="text-danger">*</span>
              </label>
              <input type="text" class="form-input" placeholder="Ej: Desarrollo Económico Sostenible" formControlName="nombre">
              @if (form.get('nombre')?.invalid && form.get('nombre')?.touched) {
                <p class="mt-1 text-danger text-xs">Este campo es requerido</p>
              }
            </div>

            <div>
              <label class="block mb-1.5 text-sm font-medium text-default-800">Descripción</label>
              <textarea class="form-input" rows="5"
                placeholder="Descripción del eje estratégico, objetivos generales y alcance..."
                formControlName="descripcion"></textarea>
            </div>

          </div>
        </div>

      </div>

      <!-- Columna lateral -->
      <div class="space-y-5">

        <div class="card">
          <div class="card-header"><h6 class="card-title">Imagen representativa</h6></div>
          <div class="card-body">
            @if (imgPreview()) {
              <div class="relative mb-3">
                <img [src]="imgPreview()!" alt="preview" class="w-full h-36 object-cover rounded-lg">
                <button type="button" (click)="removeImg()"
                  class="absolute top-2 right-2 btn size-7 bg-danger text-white p-0">
                  <div class="size-3.5"><ng-icon name="lucideX"></ng-icon></div>
                </button>
              </div>
            }
            <label class="flex flex-col items-center justify-center w-full h-24 border-2 border-dashed border-default-300 rounded-lg cursor-pointer hover:border-primary hover:bg-primary/5 transition-colors">
              @if (uploadingImg()) {
                <div class="size-4 animate-spin text-primary"><ng-icon name="lucideLoader"></ng-icon></div>
                <span class="text-xs text-default-500 mt-1">Subiendo...</span>
              } @else {
                <div class="size-5 text-default-400 mb-1"><ng-icon name="lucideUpload"></ng-icon></div>
                <span class="text-xs text-default-500">Subir imagen</span>
              }
              <input type="file" accept="image/*" class="hidden" (change)="onImgSelected($event)" [disabled]="uploadingImg()">
            </label>
          </div>
        </div>

        <div class="card">
          <div class="card-header"><h6 class="card-title">Opciones</h6></div>
          <div class="card-body space-y-4">

            <div>
              <label class="block mb-1.5 text-sm font-medium text-default-800">Color identificador</label>
              <div class="flex items-center gap-3">
                <input type="color" class="h-10 w-14 rounded border border-default-300 cursor-pointer p-0.5" formControlName="color">
                <input type="text" class="form-input font-mono text-sm" placeholder="#3b82f6" formControlName="color">
              </div>
            </div>

            <div>
              <label class="block mb-1.5 text-sm font-medium text-default-800">Orden de aparición</label>
              <input type="number" class="form-input" formControlName="orden" min="0">
            </div>

            <div class="flex items-center gap-2">
              <input type="checkbox" id="activo" formControlName="activo" class="form-checkbox">
              <label for="activo" class="text-sm text-default-700">Activo (visible en el portal)</label>
            </div>

          </div>
        </div>

        <div class="flex flex-col gap-2">
          <button
            type="submit"
            class="btn bg-primary text-white w-full"
            [disabled]="form.invalid || submitting() || uploadingImg()"
          >
            @if (submitting()) {
              <div class="size-4 me-1 animate-spin"><ng-icon name="lucideLoader"></ng-icon></div>
              Guardando...
            } @else {
              Registrar Eje PEI
            }
          </button>
          <a routerLink="/senefco/ejes-pei" class="btn border border-default-300 text-default-600 hover:bg-default-100 w-full text-center">
            Cancelar
          </a>
        </div>

      </div>
    </div>
  </form>
</main>
