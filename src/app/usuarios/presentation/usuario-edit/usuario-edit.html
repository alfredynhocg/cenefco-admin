<main>
  <app-page-title title="Editar Usuario" subtitle="Usuarios" />

  <div class="grid grid-cols-1 gap-6">
    <div class="card">
      <div class="card-body">
        <h6 class="mb-4 card-title">Editar Usuario</h6>
        <form [formGroup]="form" (ngSubmit)="onSubmit()">

          <div class="grid lg:grid-cols-2 grid-cols-1 gap-5 mb-5">
            <div>
              <label class="inline-block mb-2 text-sm text-default-800 font-medium">Nombre completo <span class="text-danger">*</span></label>
              <input type="text" class="form-input" placeholder="Nombre del usuario" formControlName="name">
              @if (form.get('name')?.invalid && form.get('name')?.touched) {
                <p class="mt-1 text-danger text-xs">Este campo es requerido</p>
              }
            </div>
            <div>
              <label class="inline-block mb-2 text-sm text-default-800 font-medium">Email <span class="text-danger">*</span></label>
              <input type="email" class="form-input" placeholder="correo@ejemplo.com" formControlName="email">
              @if (form.get('email')?.invalid && form.get('email')?.touched) {
                <p class="mt-1 text-danger text-xs">Ingrese un email válido</p>
              }
            </div>
          </div>

          <div class="grid lg:grid-cols-2 grid-cols-1 gap-5 mb-5">
            <div>
              <label class="inline-block mb-2 text-sm text-default-800 font-medium">Nueva Contraseña <span class="text-default-400 font-normal">(dejar vacío para no cambiar)</span></label>
              <input type="password" class="form-input" placeholder="Nueva contraseña (mínimo 8)" formControlName="password">
            </div>
            <div>
              <label class="inline-block mb-2 text-sm text-default-800 font-medium">Rol</label>
              <select class="form-input" formControlName="role_id">
                <option [ngValue]="null">Sin rol asignado</option>
                @for (r of roles(); track r.id) {
                  <option [ngValue]="r.id">{{ r.nombre }}</option>
                }
              </select>
            </div>
          </div>

          <div class="flex items-center gap-3 mb-5">
            <label class="text-sm font-medium text-default-800">Estado</label>
            <label class="relative inline-flex items-center cursor-pointer">
              <input type="checkbox" class="sr-only peer" formControlName="activo">
              <div class="w-11 h-6 bg-default-200 peer-checked:bg-primary rounded-full peer peer-checked:after:translate-x-full after:content-[''] after:absolute after:top-[2px] after:start-[2px] after:bg-white after:rounded-full after:h-5 after:w-5 after:transition-all"></div>
              <span class="ms-2 text-sm text-default-600">{{ form.get('activo')?.value ? 'Activo' : 'Inactivo' }}</span>
            </label>
          </div>

          <div class="mt-4 flex gap-2 md:justify-end">
            <button type="button" class="btn border border-default-300 text-default-600" routerLink="/senefco/usuarios">Cancelar</button>
            <button type="submit" class="text-white btn bg-primary" [disabled]="form.invalid">Guardar Cambios</button>
          </div>
        </form>
      </div>
    </div>
  </div>
</main>
