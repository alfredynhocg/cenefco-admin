<main>
  <app-page-title
    [title]="'Nuevo Ítem — ' + (menuNombre() || '...')"
    subtitle="Gestión de Menús"
  />

  <div class="grid grid-cols-1 gap-5">
    <div class="card">
      <div class="card-header">
        <h6 class="card-title">Datos del Ítem</h6>
      </div>

      <form [formGroup]="form" (ngSubmit)="onSubmit()" class="card-body space-y-5">

        <div class="grid lg:grid-cols-2 grid-cols-1 gap-5">

          <!-- Etiqueta -->
          <div>
            <label class="block mb-1.5 text-sm font-medium text-default-800">
              Etiqueta <span class="text-danger">*</span>
            </label>
            <input type="text" class="form-input" placeholder="Ej: Inicio" formControlName="etiqueta" maxlength="150">
            @if (form.get('etiqueta')?.invalid && form.get('etiqueta')?.touched) {
              <p class="mt-1 text-danger text-xs">La etiqueta es obligatoria.</p>
            }
          </div>

          <!-- URL -->
          <div>
            <label class="block mb-1.5 text-sm font-medium text-default-800">URL</label>
            <input type="text" class="form-input" placeholder="/pagina o https://..." formControlName="url" maxlength="255">
          </div>

          <!-- Padre -->
          <div>
            <label class="block mb-1.5 text-sm font-medium text-default-800">Ítem Padre</label>
            <select class="form-select" formControlName="parent_id">
              <option [value]="null">— Sin padre (nivel raíz) —</option>
              @for (sib of siblings(); track sib.id) {
                <option [value]="sib.id">{{ sib.etiqueta }}</option>
              }
            </select>
          </div>

          <!-- Orden -->
          <div>
            <label class="block mb-1.5 text-sm font-medium text-default-800">Orden</label>
            <input type="number" class="form-input" formControlName="orden" min="0">
          </div>

          <!-- Icono -->
          <div>
            <label class="block mb-1.5 text-sm font-medium text-default-800">Icono</label>
            <input type="text" class="form-input" placeholder="Ej: home, newspaper, info..." formControlName="icono" maxlength="50">
          </div>

          <!-- Abrir en nueva ventana -->
          <div class="flex items-center gap-3 pt-5">
            <label class="text-sm font-medium text-default-800">Abrir en nueva ventana</label>
            <label class="relative inline-flex items-center cursor-pointer">
              <input type="checkbox" class="sr-only peer" formControlName="abrir_nueva_ventana">
              <div class="w-11 h-6 bg-default-200 peer-checked:bg-primary rounded-full peer peer-checked:after:translate-x-full after:content-[''] after:absolute after:top-[2px] after:start-[2px] after:bg-white after:rounded-full after:h-5 after:w-5 after:transition-all"></div>
              <span class="ms-2 text-sm text-default-600">{{ form.get('abrir_nueva_ventana')?.value ? 'Sí' : 'No' }}</span>
            </label>
          </div>

          <!-- Activo -->
          <div class="flex items-center gap-3 pt-5">
            <label class="text-sm font-medium text-default-800">Estado</label>
            <label class="relative inline-flex items-center cursor-pointer">
              <input type="checkbox" class="sr-only peer" formControlName="activo">
              <div class="w-11 h-6 bg-default-200 peer-checked:bg-primary rounded-full peer peer-checked:after:translate-x-full after:content-[''] after:absolute after:top-[2px] after:start-[2px] after:bg-white after:rounded-full after:h-5 after:w-5 after:transition-all"></div>
              <span class="ms-2 text-sm text-default-600">{{ form.get('activo')?.value ? 'Activo' : 'Inactivo' }}</span>
            </label>
          </div>

        </div>

        <div class="flex items-center gap-3 pt-2">
          <button
            type="submit"
            class="btn bg-primary text-white"
            [disabled]="form.invalid || submitting()"
          >
            @if (submitting()) {
              <div class="size-4 me-1 animate-spin"><ng-icon name="lucideLoader"></ng-icon></div>
              Guardando...
            } @else {
              Crear Ítem
            }
          </button>
          <a [routerLink]="['/senefco/menu-items', menuId()]" class="btn border border-default-300 text-default-600 hover:bg-default-100">
            Cancelar
          </a>
        </div>

      </form>
    </div>
  </div>
</main>
