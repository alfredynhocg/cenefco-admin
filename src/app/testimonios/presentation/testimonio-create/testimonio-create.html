<main>
  <app-page-title title="Nuevo Testimonio" subtitle="Testimonios" />
  <div class="grid grid-cols-1 gap-5 mb-5">
    <div class="card">
      <div class="card-header"><h4 class="card-title">Datos del Testimonio</h4></div>
      <div class="p-6">
        <form [formGroup]="form" (ngSubmit)="onSubmit()" class="grid grid-cols-1 md:grid-cols-2 gap-5">

          <div>
            <label class="block text-sm font-medium text-default-700 mb-1">Nombre <span class="text-danger">*</span></label>
            <input type="text" formControlName="nombre" class="form-input w-full" placeholder="Nombre del autor">
            @if (form.get('nombre')?.invalid && form.get('nombre')?.touched) {
              <p class="text-danger text-xs mt-1">El nombre es requerido</p>
            }
          </div>

          <div>
            <label class="block text-sm font-medium text-default-700 mb-1">Calificación (1-5)</label>
            <input type="number" formControlName="calificacion" class="form-input w-full" min="1" max="5">
          </div>

          <div>
            <label class="block text-sm font-medium text-default-700 mb-1">Cargo</label>
            <input type="text" formControlName="cargo" class="form-input w-full" placeholder="Ej: Egresado">
          </div>

          <div>
            <label class="block text-sm font-medium text-default-700 mb-1">Empresa / Institución</label>
            <input type="text" formControlName="empresa" class="form-input w-full">
          </div>

          <div class="md:col-span-2">
            <label class="block text-sm font-medium text-default-700 mb-1">Testimonio <span class="text-danger">*</span></label>
            <textarea formControlName="testimonio" rows="4" class="form-input w-full" placeholder="Texto del testimonio"></textarea>
            @if (form.get('testimonio')?.invalid && form.get('testimonio')?.touched) {
              <p class="text-danger text-xs mt-1">El testimonio es requerido</p>
            }
          </div>

          <div>
            <label class="block text-sm font-medium text-default-700 mb-1">URL Foto</label>
            <input type="text" formControlName="foto_url" class="form-input w-full" placeholder="https://...">
          </div>

          <div>
            <label class="block text-sm font-medium text-default-700 mb-1">Alt de la Foto</label>
            <input type="text" formControlName="foto_alt" class="form-input w-full">
          </div>

          <div>
            <label class="block text-sm font-medium text-default-700 mb-1">Orden</label>
            <input type="number" formControlName="orden" class="form-input w-full" min="0">
          </div>

          <div>
            <label class="block text-sm font-medium text-default-700 mb-1">Estado</label>
            <select formControlName="estado" class="form-input w-full">
              <option value="publicado">Publicado</option>
              <option value="borrador">Borrador</option>
            </select>
          </div>

          <div class="md:col-span-2 flex items-center gap-2">
            <input type="checkbox" formControlName="destacado" id="destacado" class="form-checkbox">
            <label for="destacado" class="text-sm text-default-700">Destacado</label>
          </div>

          <div class="md:col-span-2 flex items-center gap-3">
            <button type="submit" class="btn bg-primary text-white" [disabled]="submitting()">
              @if (submitting()) { <div class="size-4 me-2 animate-spin"><ng-icon name="lucideLoader"></ng-icon></div> Guardando... }
              @else { Guardar Testimonio }
            </button>
            <a routerLink="/senefco/testimonios" class="btn bg-default-200 text-default-700">Cancelar</a>
          </div>

        </form>
      </div>
    </div>
  </div>
</main>
