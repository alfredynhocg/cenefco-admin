<div class="fixed top-4 right-4 z-[9999] flex flex-col gap-2.5 w-80 pointer-events-none">

  @for (toast of toastService.toasts(); track trackById($index, toast)) {
    <div
      class="pointer-events-auto flex items-start gap-3 rounded-xl border px-4 py-3.5 shadow-lg backdrop-blur-sm animate-in slide-in-from-right-5 fade-in duration-300"
      [class]="toastClasses(toast.type)">

      <!-- Icon -->
      <div class="mt-0.5 shrink-0" [innerHTML]="toastIcon(toast.type)"></div>

      <!-- Content -->
      <div class="flex-1 min-w-0">
        <p class="text-sm font-semibold leading-tight">{{ toast.title }}</p>
        @if (toast.message) {
          <p class="mt-0.5 text-xs opacity-85 leading-snug">{{ toast.message }}</p>
        }
      </div>

      <!-- Close -->
      <button
        type="button"
        class="shrink-0 mt-0.5 opacity-60 hover:opacity-100 transition-opacity"
        (click)="toastService.dismiss(toast.id)">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" viewBox="0 0 20 20" fill="currentColor">
          <path fill-rule="evenodd" d="M4.293 4.293a1 1 0 011.414 0L10 8.586l4.293-4.293a1 1 0 111.414 1.414L11.414 10l4.293 4.293a1 1 0 01-1.414 1.414L10 11.414l-4.293 4.293a1 1 0 01-1.414-1.414L8.586 10 4.293 5.707a1 1 0 010-1.414z" clip-rule="evenodd" />
        </svg>
      </button>

    </div>
  }

</div>
