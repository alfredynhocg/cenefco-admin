<main>
  <app-page-title title="Nueva Foto" subtitle="Galería de Fotos" />
  <div class="grid grid-cols-1 gap-5 mb-5">
    <div class="card">
      <div class="card-header"><h4 class="card-title">Datos de la Foto</h4></div>
      <div class="p-6">
        <form [formGroup]="form" (ngSubmit)="onSubmit()" class="grid grid-cols-1 md:grid-cols-2 gap-5">
          <div class="md:col-span-2">
            <label class="block text-sm font-medium text-default-700 mb-1">Título <span class="text-danger">*</span></label>
            <input type="text" formControlName="titulo_foto" class="form-input w-full" placeholder="Título de la foto">
            @if (form.get('titulo_foto')?.invalid && form.get('titulo_foto')?.touched) { <p class="text-danger text-xs mt-1">El título es requerido</p> }
          </div>
          <div class="md:col-span-2">
            <label class="block text-sm font-medium text-default-700 mb-1">URL de la Foto</label>
            <input type="text" formControlName="foto" class="form-input w-full" placeholder="https://... o ruta relativa">
          </div>
          <div>
            <label class="block text-sm font-medium text-default-700 mb-1">Fecha</label>
            <input type="date" formControlName="fecha_foto" class="form-input w-full">
          </div>
          <div>
            <label class="block text-sm font-medium text-default-700 mb-1">Estado</label>
            <select formControlName="estado" class="form-input w-full">
              <option [value]="1">Activo</option>
              <option [value]="0">Inactivo</option>
            </select>
          </div>
          <div class="md:col-span-2">
            <label class="block text-sm font-medium text-default-700 mb-1">Descripción</label>
            <textarea formControlName="descripcion_foto" rows="3" class="form-input w-full" placeholder="Descripción de la foto..."></textarea>
          </div>
          <div class="md:col-span-2 flex items-center gap-3">
            <button type="submit" class="btn bg-primary text-white" [disabled]="submitting()">
              @if (submitting()) { <div class="size-4 me-2 animate-spin"><ng-icon name="lucideLoader"></ng-icon></div> Guardando... }
              @else { Guardar Foto }
            </button>
            <a routerLink="/senefco/fotos" class="btn bg-default-200 text-default-700">Cancelar</a>
          </div>
        </form>
      </div>
    </div>
  </div>
</main>
