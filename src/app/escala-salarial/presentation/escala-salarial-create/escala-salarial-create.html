<main>
  <app-page-title title="Nuevo Registro de Escala Salarial" subtitle="Portal Institucional" />

  <form [formGroup]="form" (ngSubmit)="onSubmit()">
    <div class="grid lg:grid-cols-3 grid-cols-1 gap-5">

      <!-- Columna principal -->
      <div class="lg:col-span-2 space-y-5">

        <!-- Identificación del cargo -->
        <div class="card">
          <div class="card-header"><h6 class="card-title">Identificación del Cargo</h6></div>
          <div class="card-body space-y-4">

            <div class="grid sm:grid-cols-2 gap-4">
              <div>
                <label class="block mb-1.5 text-sm font-medium text-default-800">Año <span class="text-danger">*</span></label>
                <select class="form-input" formControlName="anio">
                  @for (anio of anios; track anio) {
                    <option [value]="anio">{{ anio }}</option>
                  }
                </select>
              </div>
              <div>
                <label class="block mb-1.5 text-sm font-medium text-default-800">Secretaría / Unidad</label>
                <input type="text" class="form-input" placeholder="Ej: Sec. de Obras Públicas" formControlName="secretaria">
              </div>
            </div>

            <div>
              <label class="block mb-1.5 text-sm font-medium text-default-800">
                Cargo / Ítem <span class="text-danger">*</span>
              </label>
              <input type="text" class="form-input" placeholder="Ej: Director General, Técnico I, Auxiliar Administrativo" formControlName="cargo">
              @if (form.get('cargo')?.invalid && form.get('cargo')?.touched) {
                <p class="mt-1 text-danger text-xs">Este campo es requerido</p>
              }
            </div>

            <div class="grid sm:grid-cols-2 gap-4">
              <div>
                <label class="block mb-1.5 text-sm font-medium text-default-800">Nivel</label>
                <input type="text" class="form-input" placeholder="Ej: Ejecutivo, Profesional, Técnico" formControlName="nivel">
              </div>
              <div>
                <label class="block mb-1.5 text-sm font-medium text-default-800">Categoría</label>
                <input type="text" class="form-input" placeholder="Ej: I, II, III, A, B" formControlName="categoria">
              </div>
            </div>

          </div>
        </div>

        <!-- Estructura salarial -->
        <div class="card">
          <div class="card-header"><h6 class="card-title">Estructura Salarial (Bs.)</h6></div>
          <div class="card-body space-y-4">

            <div class="grid sm:grid-cols-2 gap-4">
              <div>
                <label class="block mb-1.5 text-sm font-medium text-default-800">
                  Salario básico <span class="text-danger">*</span>
                </label>
                <input type="number" class="form-input" placeholder="0.00" min="0" step="0.01" formControlName="salario_basico">
              </div>
              <div>
                <label class="block mb-1.5 text-sm font-medium text-default-800">Bono de antigüedad</label>
                <input type="number" class="form-input" placeholder="0.00" min="0" step="0.01" formControlName="bono_antiguedad">
              </div>
            </div>

            <div class="grid sm:grid-cols-2 gap-4">
              <div>
                <label class="block mb-1.5 text-sm font-medium text-default-800">Bono de producción</label>
                <input type="number" class="form-input" placeholder="0.00" min="0" step="0.01" formControlName="bono_produccion">
              </div>
              <div>
                <label class="block mb-1.5 text-sm font-medium text-default-800">Otros bonos</label>
                <input type="number" class="form-input" placeholder="0.00" min="0" step="0.01" formControlName="otros_bonos">
              </div>
            </div>

            <!-- Resumen -->
            <div class="mt-2 p-4 bg-default-100 rounded-lg flex items-center justify-between">
              <span class="text-sm font-medium text-default-600">Total ganado estimado</span>
              <span class="text-lg font-bold text-success">Bs {{ totalGanado | number:'1.2-2' }}</span>
            </div>

          </div>
        </div>

      </div>

      <!-- Columna lateral -->
      <div class="space-y-5">

        <div class="card">
          <div class="card-header"><h6 class="card-title">Publicación</h6></div>
          <div class="card-body">
            <div class="flex items-center gap-2">
              <input type="checkbox" id="publicado" formControlName="publicado" class="form-checkbox">
              <label for="publicado" class="text-sm text-default-700">Publicar en el portal</label>
            </div>
          </div>
        </div>

        <div class="flex flex-col gap-2">
          <button
            type="submit"
            class="btn bg-primary text-white w-full"
            [disabled]="form.invalid || submitting()"
          >
            @if (submitting()) {
              <div class="size-4 me-1 animate-spin"><ng-icon name="lucideLoader"></ng-icon></div>
              Guardando...
            } @else {
              Registrar
            }
          </button>
          <a routerLink="/senefco/escala-salarial" class="btn border border-default-300 text-default-600 hover:bg-default-100 w-full text-center">
            Cancelar
          </a>
        </div>

      </div>
    </div>
  </form>
</main>
