<main>
  <app-page-title title="Nuevo Descuento" subtitle="Descuentos y Promociones" />
  <div class="grid grid-cols-1 gap-5 mb-5">
    <div class="card">
      <div class="card-header"><h4 class="card-title">Datos del Descuento</h4></div>
      <div class="p-6">
        <form [formGroup]="form" (ngSubmit)="onSubmit()" class="grid grid-cols-1 md:grid-cols-2 gap-5">
          <div>
            <label class="block text-sm font-medium text-default-700 mb-1">Código <span class="text-danger">*</span></label>
            <input type="text" formControlName="codigo" class="form-input w-full" placeholder="Ej: PROMO20">
            @if (form.get('codigo')?.invalid && form.get('codigo')?.touched) { <p class="text-danger text-xs mt-1">El código es requerido</p> }
          </div>
          <div>
            <label class="block text-sm font-medium text-default-700 mb-1">Nombre <span class="text-danger">*</span></label>
            <input type="text" formControlName="nombre" class="form-input w-full" placeholder="Nombre del descuento">
            @if (form.get('nombre')?.invalid && form.get('nombre')?.touched) { <p class="text-danger text-xs mt-1">El nombre es requerido</p> }
          </div>
          <div>
            <label class="block text-sm font-medium text-default-700 mb-1">Tipo de Descuento</label>
            <select formControlName="tipo_descuento" class="form-input w-full">
              <option value="porcentaje">Porcentaje (%)</option>
              <option value="monto_fijo">Monto Fijo (Bs.)</option>
            </select>
          </div>
          <div>
            <label class="block text-sm font-medium text-default-700 mb-1">Valor <span class="text-danger">*</span></label>
            <input type="number" formControlName="valor" class="form-input w-full" min="0" step="0.01">
          </div>
          <div>
            <label class="block text-sm font-medium text-default-700 mb-1">Monto Mínimo</label>
            <input type="number" formControlName="monto_minimo" class="form-input w-full" min="0" step="0.01" placeholder="0.00">
          </div>
          <div>
            <label class="block text-sm font-medium text-default-700 mb-1">Usos Máximos</label>
            <input type="number" formControlName="usos_maximos" class="form-input w-full" min="1" placeholder="Ilimitado">
          </div>
          <div>
            <label class="block text-sm font-medium text-default-700 mb-1">Usos por Usuario</label>
            <input type="number" formControlName="usos_por_usuario" class="form-input w-full" min="1">
          </div>
          <div>
            <label class="block text-sm font-medium text-default-700 mb-1">Programa ID</label>
            <input type="number" formControlName="programa_id" class="form-input w-full" min="1" placeholder="Opcional">
          </div>
          <div>
            <label class="block text-sm font-medium text-default-700 mb-1">Fecha Inicio</label>
            <input type="date" formControlName="fecha_inicio" class="form-input w-full">
          </div>
          <div>
            <label class="block text-sm font-medium text-default-700 mb-1">Fecha Fin</label>
            <input type="date" formControlName="fecha_fin" class="form-input w-full">
          </div>
          <div class="md:col-span-2">
            <label class="block text-sm font-medium text-default-700 mb-1">Descripción</label>
            <textarea formControlName="descripcion" rows="3" class="form-input w-full" placeholder="Descripción opcional"></textarea>
          </div>
          <div class="flex items-center gap-2 pt-5">
            <input type="checkbox" formControlName="activo" id="activo" class="form-checkbox">
            <label for="activo" class="text-sm text-default-700">Activo</label>
          </div>
          <div class="md:col-span-2 flex items-center gap-3">
            <button type="submit" class="btn bg-primary text-white" [disabled]="submitting()">
              @if (submitting()) { <div class="size-4 me-2 animate-spin"><ng-icon name="lucideLoader"></ng-icon></div> Guardando... } @else { Guardar Descuento }
            </button>
            <a routerLink="/senefco/descuentos-promociones" class="btn bg-default-200 text-default-700">Cancelar</a>
          </div>
        </form>
      </div>
    </div>
  </div>
</main>
