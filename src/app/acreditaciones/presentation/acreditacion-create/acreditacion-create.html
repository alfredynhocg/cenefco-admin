<main>
  <app-page-title title="Nueva Acreditación" subtitle="Acreditaciones" />
  <div class="grid grid-cols-1 gap-5 mb-5">
    <div class="card">
      <div class="card-header"><h4 class="card-title">Datos de la Acreditación</h4></div>
      <div class="p-6">
        <form [formGroup]="form" (ngSubmit)="onSubmit()" class="grid grid-cols-1 md:grid-cols-2 gap-5">
          <div class="md:col-span-2">
            <label class="block text-sm font-medium text-default-700 mb-1">Nombre <span class="text-danger">*</span></label>
            <input type="text" formControlName="nombre" class="form-input w-full" placeholder="Nombre de la acreditación">
            @if (form.get('nombre')?.invalid && form.get('nombre')?.touched) { <p class="text-danger text-xs mt-1">El nombre es requerido</p> }
          </div>
          <div>
            <label class="block text-sm font-medium text-default-700 mb-1">Entidad Otorgante <span class="text-danger">*</span></label>
            <input type="text" formControlName="entidad_otorgante" class="form-input w-full" placeholder="Nombre de la entidad">
            @if (form.get('entidad_otorgante')?.invalid && form.get('entidad_otorgante')?.touched) { <p class="text-danger text-xs mt-1">La entidad es requerida</p> }
          </div>
          <div>
            <label class="block text-sm font-medium text-default-700 mb-1">Tipo</label>
            <input type="text" formControlName="tipo" class="form-input w-full" placeholder="Ej: nacional, internacional">
          </div>
          <div>
            <label class="block text-sm font-medium text-default-700 mb-1">Fecha de Obtención</label>
            <input type="date" formControlName="fecha_obtencion" class="form-input w-full">
          </div>
          <div>
            <label class="block text-sm font-medium text-default-700 mb-1">Fecha de Vencimiento</label>
            <input type="date" formControlName="fecha_vencimiento" class="form-input w-full">
          </div>
          <div>
            <label class="block text-sm font-medium text-default-700 mb-1">URL Logo</label>
            <input type="text" formControlName="logo_url" class="form-input w-full" placeholder="https://...">
          </div>
          <div>
            <label class="block text-sm font-medium text-default-700 mb-1">Alt Logo</label>
            <input type="text" formControlName="logo_alt" class="form-input w-full">
          </div>
          <div class="md:col-span-2">
            <label class="block text-sm font-medium text-default-700 mb-1">URL de Verificación</label>
            <input type="text" formControlName="url_verificacion" class="form-input w-full" placeholder="https://...">
          </div>
          <div class="md:col-span-2">
            <label class="block text-sm font-medium text-default-700 mb-1">Descripción</label>
            <textarea formControlName="descripcion" rows="3" class="form-input w-full"></textarea>
          </div>
          <div>
            <label class="block text-sm font-medium text-default-700 mb-1">Orden</label>
            <input type="number" formControlName="orden" class="form-input w-full" min="0">
          </div>
          <div class="flex items-center gap-2 pt-5">
            <input type="checkbox" formControlName="activo" id="activo" class="form-checkbox">
            <label for="activo" class="text-sm text-default-700">Activo</label>
          </div>
          <div class="md:col-span-2 flex items-center gap-3">
            <button type="submit" class="btn bg-primary text-white" [disabled]="submitting()">
              @if (submitting()) { <div class="size-4 me-2 animate-spin"><ng-icon name="lucideLoader"></ng-icon></div> Guardando... } @else { Guardar Acreditación }
            </button>
            <a routerLink="/senefco/acreditaciones" class="btn bg-default-200 text-default-700">Cancelar</a>
          </div>
        </form>
      </div>
    </div>
  </div>
</main>
