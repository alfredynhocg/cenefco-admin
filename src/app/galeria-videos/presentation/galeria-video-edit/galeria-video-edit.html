<main>
  <app-page-title title="Editar Video" subtitle="Galería de Videos" />
  <div class="grid grid-cols-1 gap-5 mb-5">
    <div class="card">
      <div class="card-header"><h4 class="card-title">Datos del Video</h4></div>
      <div class="p-6">
        @if (loading()) {
          <div class="flex items-center justify-center py-16 text-default-500 text-sm gap-2"><div class="size-4 animate-spin"><ng-icon name="lucideLoader"></ng-icon></div> Cargando...</div>
        } @else {
          <form [formGroup]="form" (ngSubmit)="onSubmit()" class="grid grid-cols-1 md:grid-cols-2 gap-5">
            <div class="md:col-span-2">
              <label class="block text-sm font-medium text-default-700 mb-1">Título <span class="text-danger">*</span></label>
              <input type="text" formControlName="titulo" class="form-input w-full">
            </div>
            <div>
              <label class="block text-sm font-medium text-default-700 mb-1">Plataforma</label>
              <select formControlName="plataforma" class="form-input w-full">
                <option value="youtube">YouTube</option><option value="vimeo">Vimeo</option>
                <option value="facebook">Facebook</option><option value="otro">Otro</option>
              </select>
            </div>
            <div>
              <label class="block text-sm font-medium text-default-700 mb-1">Tipo</label>
              <input type="text" formControlName="tipo" class="form-input w-full">
            </div>
            <div class="md:col-span-2">
              <label class="block text-sm font-medium text-default-700 mb-1">URL del Video <span class="text-danger">*</span></label>
              <input type="text" formControlName="url_video" class="form-input w-full">
            </div>
            <div>
              <label class="block text-sm font-medium text-default-700 mb-1">ID del Video</label>
              <input type="text" formControlName="video_id" class="form-input w-full">
            </div>
            <div>
              <label class="block text-sm font-medium text-default-700 mb-1">URL Miniatura</label>
              <input type="text" formControlName="miniatura_url" class="form-input w-full">
            </div>
            <div>
              <label class="block text-sm font-medium text-default-700 mb-1">Duración</label>
              <input type="text" formControlName="duracion" class="form-input w-full">
            </div>
            <div>
              <label class="block text-sm font-medium text-default-700 mb-1">Orden</label>
              <input type="number" formControlName="orden" class="form-input w-full" min="0">
            </div>
            <div class="md:col-span-2">
              <label class="block text-sm font-medium text-default-700 mb-1">Descripción</label>
              <textarea formControlName="descripcion" rows="3" class="form-input w-full"></textarea>
            </div>
            <div class="md:col-span-2 flex items-center gap-6">
              <div class="flex items-center gap-2"><input type="checkbox" formControlName="destacado" id="destacado" class="form-checkbox"><label for="destacado" class="text-sm text-default-700">Destacado</label></div>
              <div class="flex items-center gap-2"><input type="checkbox" formControlName="activo" id="activo" class="form-checkbox"><label for="activo" class="text-sm text-default-700">Activo</label></div>
            </div>
            <div class="md:col-span-2 flex items-center gap-3">
              <button type="submit" class="btn bg-primary text-white" [disabled]="submitting()">
                @if (submitting()) { <div class="size-4 me-2 animate-spin"><ng-icon name="lucideLoader"></ng-icon></div> Guardando... } @else { Actualizar Video }
              </button>
              <a routerLink="/senefco/galeria-videos" class="btn bg-default-200 text-default-700">Cancelar</a>
            </div>
          </form>
        }
      </div>
    </div>
  </div>
</main>
