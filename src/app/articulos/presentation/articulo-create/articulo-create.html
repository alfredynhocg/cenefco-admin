<main>
  <app-page-title title="Nuevo Artículo" subtitle="Artículos" />
  <div class="grid grid-cols-1 gap-5 mb-5">
    <div class="card">
      <div class="card-header"><h4 class="card-title">Datos del Artículo</h4></div>
      <div class="p-6">
        <form [formGroup]="form" (ngSubmit)="onSubmit()" class="grid grid-cols-1 md:grid-cols-2 gap-5">
          <div class="md:col-span-2">
            <label class="block text-sm font-medium text-default-700 mb-1">Título <span class="text-danger">*</span></label>
            <input type="text" formControlName="titulo" class="form-input w-full" placeholder="Título del artículo">
            @if (form.get('titulo')?.invalid && form.get('titulo')?.touched) { <p class="text-danger text-xs mt-1">El título es requerido</p> }
          </div>
          <div>
            <label class="block text-sm font-medium text-default-700 mb-1">N° de Artículo</label>
            <input type="number" formControlName="num_art" class="form-input w-full">
          </div>
          <div>
            <label class="block text-sm font-medium text-default-700 mb-1">ID Autor</label>
            <input type="number" formControlName="autor" class="form-input w-full" placeholder="ID del usuario autor">
          </div>
          <div>
            <label class="block text-sm font-medium text-default-700 mb-1">Categoría (ID)</label>
            <input type="number" formControlName="id_cat_art" class="form-input w-full" placeholder="ID de categoría">
          </div>
          <div>
            <label class="block text-sm font-medium text-default-700 mb-1">Estado</label>
            <select formControlName="estado" class="form-input w-full">
              <option [value]="1">Activo</option>
              <option [value]="0">Inactivo</option>
            </select>
          </div>
          <div class="md:col-span-2">
            <label class="block text-sm font-medium text-default-700 mb-1">Contenido</label>
            <textarea formControlName="contenido" rows="6" class="form-input w-full" placeholder="Contenido del artículo..."></textarea>
          </div>
          <div class="md:col-span-2 flex items-center gap-3">
            <button type="submit" class="btn bg-primary text-white" [disabled]="submitting()">
              @if (submitting()) { <div class="size-4 me-2 animate-spin"><ng-icon name="lucideLoader"></ng-icon></div> Guardando... }
              @else { Guardar Artículo }
            </button>
            <a routerLink="/senefco/articulos" class="btn bg-default-200 text-default-700">Cancelar</a>
          </div>
        </form>
      </div>
    </div>
  </div>
</main>
