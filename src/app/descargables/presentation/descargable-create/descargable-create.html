<main>
  <app-page-title title="Nuevo Descargable" subtitle="Descargables" />
  <div class="grid grid-cols-1 gap-5 mb-5">
    <div class="card">
      <div class="card-header"><h4 class="card-title">Datos del Descargable</h4></div>
      <div class="p-6">
        <form [formGroup]="form" (ngSubmit)="onSubmit()" class="grid grid-cols-1 md:grid-cols-2 gap-5">
          <div class="md:col-span-2">
            <label class="block text-sm font-medium text-default-700 mb-1">Nombre <span class="text-danger">*</span></label>
            <input type="text" formControlName="nombre" class="form-input w-full" placeholder="Nombre del archivo">
            @if (form.get('nombre')?.invalid && form.get('nombre')?.touched) { <p class="text-danger text-xs mt-1">El nombre es requerido</p> }
          </div>
          <div>
            <label class="block text-sm font-medium text-default-700 mb-1">Tipo</label>
            <input type="text" formControlName="tipo" class="form-input w-full" placeholder="Ej: brochure, sílabo">
          </div>
          <div>
            <label class="block text-sm font-medium text-default-700 mb-1">Orden</label>
            <input type="number" formControlName="orden" class="form-input w-full" min="0">
          </div>
          <div class="md:col-span-2">
            <label class="block text-sm font-medium text-default-700 mb-1">URL del Archivo <span class="text-danger">*</span></label>
            <input type="text" formControlName="archivo_url" class="form-input w-full" placeholder="https://...">
            @if (form.get('archivo_url')?.invalid && form.get('archivo_url')?.touched) { <p class="text-danger text-xs mt-1">La URL del archivo es requerida</p> }
          </div>
          <div class="md:col-span-2">
            <label class="block text-sm font-medium text-default-700 mb-1">URL de Imagen de Portada</label>
            <input type="text" formControlName="imagen_portada_url" class="form-input w-full" placeholder="https://...">
          </div>
          <div class="md:col-span-2 flex items-center gap-6">
            <div class="flex items-center gap-2"><input type="checkbox" formControlName="requiere_datos" id="requiere_datos" class="form-checkbox"><label for="requiere_datos" class="text-sm text-default-700">Requiere datos del usuario</label></div>
            <div class="flex items-center gap-2"><input type="checkbox" formControlName="activo" id="activo" class="form-checkbox"><label for="activo" class="text-sm text-default-700">Activo</label></div>
          </div>
          <div class="md:col-span-2 flex items-center gap-3">
            <button type="submit" class="btn bg-primary text-white" [disabled]="submitting()">
              @if (submitting()) { <div class="size-4 me-2 animate-spin"><ng-icon name="lucideLoader"></ng-icon></div> Guardando... } @else { Guardar Descargable }
            </button>
            <a routerLink="/senefco/descargables" class="btn bg-default-200 text-default-700">Cancelar</a>
          </div>
        </form>
      </div>
    </div>
  </div>
</main>
