<main>
  <app-page-title title="Nuevo Docente" subtitle="Docentes" />
  <div class="grid grid-cols-1 gap-5 mb-5">
    <div class="card">
      <div class="card-header"><h4 class="card-title">Perfil del Docente</h4></div>
      <div class="p-6">
        <form [formGroup]="form" (ngSubmit)="onSubmit()" class="grid grid-cols-1 md:grid-cols-2 gap-5">
          <div class="md:col-span-2">
            <label class="block text-sm font-medium text-default-700 mb-1">Nombre Completo <span class="text-danger">*</span></label>
            <input type="text" formControlName="nombre_completo" class="form-input w-full" placeholder="Nombre completo del docente">
            @if (form.get('nombre_completo')?.invalid && form.get('nombre_completo')?.touched) { <p class="text-danger text-xs mt-1">El nombre es requerido</p> }
          </div>
          <div>
            <label class="block text-sm font-medium text-default-700 mb-1">Título Académico</label>
            <input type="text" formControlName="titulo_academico" class="form-input w-full" placeholder="Ej: Mg., Dr.">
          </div>
          <div>
            <label class="block text-sm font-medium text-default-700 mb-1">Especialidad</label>
            <input type="text" formControlName="especialidad" class="form-input w-full" placeholder="Área de especialidad">
          </div>
          <div>
            <label class="block text-sm font-medium text-default-700 mb-1">URL Foto</label>
            <input type="text" formControlName="foto_url" class="form-input w-full" placeholder="https://...">
          </div>
          <div>
            <label class="block text-sm font-medium text-default-700 mb-1">Alt de la Foto</label>
            <input type="text" formControlName="foto_alt" class="form-input w-full">
          </div>
          <div>
            <label class="block text-sm font-medium text-default-700 mb-1">Email Público</label>
            <input type="email" formControlName="email_publico" class="form-input w-full">
          </div>
          <div>
            <label class="block text-sm font-medium text-default-700 mb-1">LinkedIn</label>
            <input type="text" formControlName="linkedin_url" class="form-input w-full" placeholder="https://linkedin.com/in/...">
          </div>
          <div>
            <label class="block text-sm font-medium text-default-700 mb-1">Twitter/X</label>
            <input type="text" formControlName="twitter_url" class="form-input w-full" placeholder="https://twitter.com/...">
          </div>
          <div>
            <label class="block text-sm font-medium text-default-700 mb-1">Sitio Web</label>
            <input type="text" formControlName="sitio_web_url" class="form-input w-full" placeholder="https://...">
          </div>
          <div class="md:col-span-2">
            <label class="block text-sm font-medium text-default-700 mb-1">Biografía</label>
            <textarea formControlName="biografia" rows="4" class="form-input w-full" placeholder="Descripción del docente"></textarea>
          </div>
          <div>
            <label class="block text-sm font-medium text-default-700 mb-1">Tipo</label>
            <input type="text" formControlName="tipo" class="form-input w-full" placeholder="Ej: docente, investigador">
          </div>
          <div>
            <label class="block text-sm font-medium text-default-700 mb-1">Estado</label>
            <select formControlName="estado" class="form-input w-full">
              <option value="publicado">Publicado</option>
              <option value="borrador">Borrador</option>
            </select>
          </div>
          <div>
            <label class="block text-sm font-medium text-default-700 mb-1">Orden</label>
            <input type="number" formControlName="orden" class="form-input w-full" min="0">
          </div>
          <div class="flex items-center gap-2 pt-5">
            <input type="checkbox" formControlName="mostrar_en_web" id="mostrar" class="form-checkbox">
            <label for="mostrar" class="text-sm text-default-700">Visible en el portal web</label>
          </div>
          <div class="md:col-span-2 flex items-center gap-3">
            <button type="submit" class="btn bg-primary text-white" [disabled]="submitting()">
              @if (submitting()) { <div class="size-4 me-2 animate-spin"><ng-icon name="lucideLoader"></ng-icon></div> Guardando... } @else { Guardar Docente }
            </button>
            <a routerLink="/senefco/docentes-perfil" class="btn bg-default-200 text-default-700">Cancelar</a>
          </div>
        </form>
      </div>
    </div>
  </div>
</main>
