<main>
  <app-page-title title="Editar Permiso" subtitle="Permisos del Sistema" />
  <div class="grid grid-cols-1 gap-5 mb-5">
    <div class="card">
      <div class="card-header"><h4 class="card-title">Datos del Permiso</h4></div>
      <div class="p-6">
        @if (loading()) {
          <div class="flex items-center justify-center py-16 text-default-500 text-sm gap-2"><div class="size-4 animate-spin"><ng-icon name="lucideLoader"></ng-icon></div> Cargando...</div>
        } @else {
          <form [formGroup]="form" (ngSubmit)="onSubmit()" class="grid grid-cols-1 md:grid-cols-2 gap-5">
            <div class="md:col-span-2">
              <label class="block text-sm font-medium text-default-700 mb-1">Código <span class="text-danger">*</span></label>
              <input type="text" formControlName="codigo" class="form-input w-full font-mono">
              @if (form.get('codigo')?.invalid && form.get('codigo')?.touched) { <p class="text-danger text-xs mt-1">El código es requerido</p> }
            </div>
            <div>
              <label class="block text-sm font-medium text-default-700 mb-1">Módulo</label>
              <input type="text" formControlName="modulo" class="form-input w-full">
            </div>
            <div>
              <label class="block text-sm font-medium text-default-700 mb-1">Descripción</label>
              <input type="text" formControlName="descripcion" class="form-input w-full">
            </div>
            <div class="md:col-span-2 flex items-center gap-3">
              <button type="submit" class="btn bg-primary text-white" [disabled]="submitting()">
                @if (submitting()) { <div class="size-4 me-2 animate-spin"><ng-icon name="lucideLoader"></ng-icon></div> Guardando... }
                @else { Guardar Cambios }
              </button>
              <a routerLink="/senefco/permisos" class="btn bg-default-200 text-default-700">Cancelar</a>
            </div>
          </form>
        }
      </div>
    </div>
  </div>
</main>
