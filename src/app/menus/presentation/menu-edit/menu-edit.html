<main>
  <app-page-title title="Editar Menú" subtitle="Gestión de Menús" />

  <div class="grid grid-cols-1 gap-5">
    <div class="card">
      <div class="card-header">
        <h6 class="card-title">Editar Datos del Menú</h6>
      </div>

      @if (loadingMenu()) {
        <div class="flex items-center justify-center py-16 text-default-500 text-sm gap-2">
          <div class="size-4 animate-spin"><ng-icon name="lucideLoader"></ng-icon></div>
          Cargando menú...
        </div>
      } @else {
        <form [formGroup]="form" (ngSubmit)="onSubmit()" class="card-body space-y-5">

          <div class="grid lg:grid-cols-2 grid-cols-1 gap-5">

            <!-- Nombre -->
            <div>
              <label class="block mb-1.5 text-sm font-medium text-default-800">
                Nombre <span class="text-danger">*</span>
              </label>
              <input type="text" class="form-input" placeholder="Ej: Menú Principal" formControlName="nombre" maxlength="80">
              @if (form.get('nombre')?.invalid && form.get('nombre')?.touched) {
                <p class="mt-1 text-danger text-xs">El nombre es obligatorio.</p>
              }
            </div>

            <!-- Descripción -->
            <div>
              <label class="block mb-1.5 text-sm font-medium text-default-800">Descripción</label>
              <input type="text" class="form-input" placeholder="Descripción breve del menú" formControlName="descripcion" maxlength="100">
            </div>

            <!-- Activo -->
            <div class="flex items-center gap-3 pt-5">
              <label class="text-sm font-medium text-default-800">Estado</label>
              <label class="relative inline-flex items-center cursor-pointer">
                <input type="checkbox" class="sr-only peer" formControlName="activo">
                <div class="w-11 h-6 bg-default-200 peer-checked:bg-primary rounded-full peer peer-checked:after:translate-x-full after:content-[''] after:absolute after:top-[2px] after:start-[2px] after:bg-white after:rounded-full after:h-5 after:w-5 after:transition-all"></div>
                <span class="ms-2 text-sm text-default-600">{{ form.get('activo')?.value ? 'Activo' : 'Inactivo' }}</span>
              </label>
            </div>

          </div>

          <div class="flex items-center gap-3 pt-2">
            <button
              type="submit"
              class="btn bg-primary text-white"
              [disabled]="form.invalid || submitting()"
            >
              @if (submitting()) {
                <div class="size-4 me-1 animate-spin"><ng-icon name="lucideLoader"></ng-icon></div>
                Guardando...
              } @else {
                Actualizar Menú
              }
            </button>
            <a routerLink="/senefco/menus" class="btn border border-default-300 text-default-600 hover:bg-default-100">
              Cancelar
            </a>
          </div>

        </form>
      }
    </div>
  </div>
</main>
