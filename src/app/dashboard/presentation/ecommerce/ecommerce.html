<main>
  <app-page-title title="Dashboard" subtitle="Alcaldía" />

  @if (loading()) {
    <div class="flex items-center justify-center py-20 text-default-500 text-sm gap-2">
      <div class="size-5 animate-spin"><ng-icon name="lucideLoader"></ng-icon></div>
      Cargando datos del dashboard...
    </div>
  } @else if (stats()) {

    <div class="grid lg:grid-cols-3 grid-cols-1 gap-5 mb-5 items-start">
      <div class="lg:col-span-2 col-span-1 flex flex-col gap-5">
        <app-banner />
        <app-overview [resumen]="stats()!.resumen" />
      </div>
      <div class="col-span-1">
        <app-order-chart [tramitesPorEstado]="stats()!.tramites_por_estado" />
      </div>
    </div>

    <div class="grid lg:grid-cols-3 grid-cols-1 gap-5 mb-5">
      <div class="lg:col-span-2 col-span-1">
        <app-sales-revenue-chart [actividadMensual]="stats()!.actividad_mensual" />
      </div>
      <div class="col-span-1">
        <app-traffic-resources-chart [ultimasConsultas]="stats()!.ultimas_consultas" />
      </div>
    </div>

    <div class="grid grid-cols-1 gap-5 mb-5">
      <app-product-orders [ultimasSolicitudes]="stats()!.ultimas_solicitudes" />
    </div>

    <div class="grid lg:grid-cols-3 grid-cols-1 gap-5">
      <app-customer-services />
      <app-monthly-sale [resumen]="stats()!.resumen" />
      <app-selling-product [topTramites]="stats()!.top_tramites" />
    </div>

  } @else {
    <div class="flex flex-col items-center justify-center py-20 text-default-400 gap-3">
      <div class="size-12"><ng-icon name="lucideAlertCircle"></ng-icon></div>
      <p class="text-sm">No se pudieron cargar los datos del dashboard.</p>
      <button class="btn btn-sm bg-primary text-white" (click)="reload()">Reintentar</button>
    </div>
  }
</main>
