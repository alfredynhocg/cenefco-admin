<div class="card h-full">
  <div class="card-header">
    <h6 class="card-title flex items-center gap-2">
      <div class="size-4 text-info"><ng-icon name="lucideMessageSquare"></ng-icon></div>
      Consultas Ciudadanas
    </h6>
    <a routerLink="/senefco/consultas-ciudadanas" class="btn btn-sm border-0 text-primary/90 hover:text-primary">
      Ver todas
      <div class="ms-1 size-4"><ng-icon name="lucideMoveRight"></ng-icon></div>
    </a>
  </div>
  <div class="card-body overflow-y-auto max-h-72">
    <div class="flex flex-col gap-3">
      @for (consulta of ultimasConsultas; track consulta.id) {
        <div class="flex items-center justify-between gap-3">
          <div class="flex items-center gap-3 min-w-0">
            <div class="flex items-center justify-center rounded-md size-9 shrink-0 bg-info/10">
              <div class="size-4 text-info"><ng-icon name="lucideUser"></ng-icon></div>
            </div>
            <div class="min-w-0">
              <h6 class="font-semibold text-default-800 text-sm truncate">{{ consulta.nombre }}</h6>
              <p class="text-xs text-default-500 truncate">{{ consulta.asunto }}</p>
            </div>
          </div>
          <span class="text-xs font-semibold px-2 py-0.5 rounded-md shrink-0
            {{ estadoClasses(consulta.estado).bg }}
            {{ estadoClasses(consulta.estado).text }}">
            {{ estadoLabel(consulta.estado) }}
          </span>
        </div>
      }
      @empty {
        <div class="flex flex-col items-center justify-center py-8 gap-2">
          <div class="size-10 text-success"><ng-icon name="lucideCircleCheck"></ng-icon></div>
          <p class="text-sm text-default-500 text-center">Sin consultas pendientes</p>
        </div>
      }
    </div>
  </div>
</div>
