name: Deploy Frontend (Angular)

on:
  push:
    branches: [main, dev]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build Angular (production)
        if: github.ref_name == 'main'
        run: npm run build -- --configuration production

      - name: Build Angular (development)
        if: github.ref_name == 'dev'
        run: npm run build -- --configuration development

      - name: Set remote path
        id: path
        run: |
          if [ "${{ github.ref_name }}" = "main" ]; then
            echo "remote=/root/ventas/prod/admin_ventas/dist/tailwick/browser/" >> $GITHUB_OUTPUT
          else
            echo "remote=/root/ventas/dev/admin_ventas/dist/tailwick/browser/" >> $GITHUB_OUTPUT
          fi

      - name: Create remote directory
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: mkdir -p ${{ steps.path.outputs.remote }}

      - name: Deploy via rsync
        uses: burnett01/rsync-deployments@7.0.1
        with:
          switches: -avzr --delete
          path: dist/tailwick/browser/
          remote_path: ${{ steps.path.outputs.remote }}
          remote_host: ${{ secrets.SSH_HOST }}
          remote_user: ${{ secrets.SSH_USER }}
          remote_key: ${{ secrets.SSH_PRIVATE_KEY }}
